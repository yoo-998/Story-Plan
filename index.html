<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Planner Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f8f9fa;
            --border: #dee2e6;
            --text: #333;
            --danger: #ff4d4d;
        }

        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #e9ecef; color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        
        #capture-area { 
            width: 850px; min-height: 1000px; background: white; 
            padding: 60px; box-sizing: border-box; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        /* --- 헤더 스타일 수정 --- */
        .header { 
            border-bottom: 3px solid #333; 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
        }
        
        /* 로고, 제목, 입력창을 한 줄에 배치하기 위한 flex 컨테이너 */
        .header-content {
            display: flex;
            align-items: center; /* 세로 중앙 정렬 */
            gap: 20px; /* 요소 간 간격 */
        }

        /* 로고 이미지 스타일 */
        .logo {
            height: 70px; /* 로고 높이 조정 */
            width: auto;
            display: block;
        }

        /* "스토리 기획" 제목 스타일 */
        .header h1 { 
            margin: 0; 
            font-size: 32px; /* 크기를 살짝 조절 */
            letter-spacing: -1px; 
            white-space: nowrap; /* 줄바꿈 방지 */
        }

        /* 입력 필드 스타일 */
        .header-inputs {
            display: flex;
            gap: 15px;
            flex-grow: 1; /* 남은 공간을 차지하도록 */
            justify-content: flex-end; /* 오른쪽으로 밀착 */
        }

        .header-inputs input { 
            border: none; 
            border-bottom: 1px solid #ccc; 
            padding: 5px; 
            font-size: 16px; 
            outline: none; 
            background: transparent;
        }
        /* --- 헤더 스타일 수정 끝 --- */

        section { margin-bottom: 45px; }
        h2 { font-size: 22px; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        h2::before { content: ''; display: inline-block; width: 6px; height: 22px; background: var(--primary); border-radius: 3px; }

        .input-group { background: #fff; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
        .input-label { background: #f8f9fa; padding: 10px 15px; font-weight: bold; font-size: 14px; border-bottom: 1px solid var(--border); color: #555; }
        
        textarea, .char-field input { 
            width: 100%; border: none; padding: 15px; box-sizing: border-box; 
            font-size: 15px; line-height: 1.6; outline: none; resize: none; overflow: hidden;
            display: block; font-family: inherit;
        }

        .character-list { display: flex; flex-direction: column; gap: 20px; }
        .character-card { 
            position: relative; border: 1px solid var(--border); border-radius: 12px; 
            padding: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: grid; grid-template-columns: 140px 140px 1fr; gap: 20px;
        }
        .char-field { display: flex; flex-direction: column; gap: 8px; }
        .char-field label { font-size: 11px; color: var(--primary); font-weight: 800; letter-spacing: 1px; }
        .char-field input, .char-field textarea { border: 1px solid #f1f1f1; border-radius: 6px; background: #fdfdfd; padding: 10px; }

        .btn-delete { 
            position: absolute; top: -10px; right: -10px; 
            background: var(--danger); color: white; border: none; width: 26px; height: 26px;
            border-radius: 50%; cursor: pointer; font-size: 14px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-add-char {
            width: 100%; padding: 18px; margin-top: 15px;
            background: #fff; border: 2px dashed var(--border); border-radius: 12px;
            color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-add-char:hover { border-color: var(--primary); color: var(--primary); background: #f8fbff; }

        .save-container { margin-bottom: 60px; }
        .btn-save { 
            padding: 16px 60px; background: #333; color: white; border: none; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; 
        }
        .btn-save:hover { transform: translateY(-3px); background: #000; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        .footer { text-align: center; margin-top: 60px; font-size: 13px; color: #bbb; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="header">
        <div class="header-content">
            <img src="에이블로고(투명).png" alt="에이블 로고" class="logo">
            
            <h1>스토리 기획</h1>
            
            <div class="header-inputs">
                <input type="text" placeholder="학교명" style="width: 180px;">
                <input type="text" placeholder="학번 / 이름" style="width: 180px;">
            </div>
        </div>
    </div>

    <section>
        <h2>1. 세계관 및 컨셉</h2>
        <div class="input-group">
            <div class="input-label">공간 및 시간적 배경</div>
            <textarea oninput="autoResize(this)" placeholder="작품의 무대가 되는 세계를 설명해 주세요."></textarea>
        </div>
        <div class="input-group">
            <div class="input-label">장르 및 전체적인 톤</div>
            <textarea oninput="autoResize(this)" rows="1" placeholder="예: 판타지, 스릴러 / 몽환적이고 어두운 분위기"></textarea>
        </div>
    </section>

    <section>
        <h2>2. 줄거리 전개 구조</h2>
        <div class="input-group">
            <div class="input-label">기본 줄거리</div>
            <textarea oninput="autoResize(this)" rows="5" placeholder="핵심 내용을 자유롭게 작성해 주세요."></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <div class="input-label">스토리 구조</div>
                <textarea oninput="autoResize(this)" rows="2" placeholder="예: 시작 → 갈등 → 전환점 → 결말 "></textarea>
            </div>
            <div class="input-group">
                <div class="input-label">핵심 갈등</div>
                <textarea oninput="autoResize(this)" rows="2" placeholder="주인공이 극복할 과제"></textarea>
            </div>
        </div>
    </section>

    <section>
        <h2>3. 캐릭터 설정</h2>
        <div id="character-container" class="character-list"></div>
        <button class="btn-add-char" onclick="addCharacter()">+ 캐릭터 추가하기</button>
    </section>

    <section>
        <h2>4. 타깃 및 매체 설정</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-group">
                <div class="input-label">주요 타깃층</div>
                <textarea oninput="autoResize(this)" rows="1" placeholder="예: 어린이, 청소년, 성인 등"></textarea>
            </div>
            <div class="input-group">
                <div class="input-label">희망 플랫폼</div>
                <textarea oninput="autoResize(this)" rows="1" placeholder="예: 웹툰, 소설, 드라마 등"></textarea>
            </div>
        </div>
    </section>

    <div class="footer">STORY PLANNER WORKSHEET | (주) 에이블</div>
</div>

<div class="save-container">
    <button class="btn-save" onclick="saveImage()">🖼️ 완성된 기획서 이미지로 저장하기</button>
</div>

<script>
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function addCharacter(type = "", name = "") {
        const container = document.getElementById('character-container');
        const card = document.createElement('div');
        card.className = 'character-card';
        card.innerHTML = `
            <button class="btn-delete" onclick="removeCharacter(this)">×</button>
            <div class="char-field">
                <label>캐릭터 유형</label>
                <input type="text" placeholder="예: 주인공" value="${type}">
            </div>
            <div class="char-field">
                <label>이름</label>
                <input type="text" placeholder="이름" value="${name}">
            </div>
            <div class="char-field">
                <label>목표 & 결핍</label>
                <textarea oninput="autoResize(this)" rows="2" placeholder="목표 및 결핍"></textarea>
            </div>
        `;
        container.appendChild(card);
    }

    function removeCharacter(btn) {
        const container = document.getElementById('character-container');
        if (container.children.length > 1) {
            btn.parentElement.remove();
        } else {
            alert("최소 한 명의 캐릭터는 필요합니다.");
        }
    }

    window.onload = function() {
        addCharacter("주인공", "");
        addCharacter("조연/라이벌", "");
        addCharacter("기타", "");
    };

    function saveImage() {
        const area = document.getElementById('capture-area');
        const btnSave = document.querySelector('.btn-save');
        
        // 중요: 이미지 내의 모든 삭제 버튼(×)을 찾습니다.
        const deleteButtons = area.querySelectorAll('.btn-delete');
        
        btnSave.innerText = "⌛ 이미지 생성 중...";

        // 1. 캡처 직전에 삭제 버튼을 모두 숨깁니다.
        deleteButtons.forEach(btn => btn.style.display = 'none');

        html2canvas(area, {
            scale: 2, // 고화질 저장
            backgroundColor: "#ffffff",
            logging: false,
            useCORS: true
        }).then(canvas => {
            // 2. 캡처가 끝나면 삭제 버튼을 다시 보이게 합니다.
            deleteButtons.forEach(btn => btn.style.display = 'flex');

            const link = document.createElement('a');
            link.download = 'Story_Plan_' + new Date().getTime() + '.png';
            link.href = canvas.toDataURL();
            link.click();
            btnSave.innerText = "🖼️ 완성된 기획서 이미지로 저장하기";
        });
    }
</script>

</body>
</html>
